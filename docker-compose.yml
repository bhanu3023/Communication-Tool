services:
  db:
    image: postgres:16-alpine
    container_name: trainer-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trainer}
      POSTGRES_USER: ${POSTGRES_USER:-trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainer}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trainer}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: trainer-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-trainer}
      POSTGRES_USER: ${POSTGRES_USER:-trainer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trainer}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me-to-a-long-random-secret-value-at-least-32-chars}
      APP_JWT_EXPIRATION_MINUTES: ${APP_JWT_EXPIRATION_MINUTES:-480}
      APP_CORS_ORIGINS: ${APP_CORS_ORIGINS:-http://localhost:5173}
      APP_DEV_LOGIN_ENABLED: ${APP_DEV_LOGIN_ENABLED:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_AUDIO_MODEL: ${OPENAI_AUDIO_MODEL-gpt-4o-mini-audio-preview}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_AZURE_TENANT_ID: ${VITE_AZURE_TENANT_ID}
        VITE_AZURE_CLIENT_ID: ${VITE_AZURE_CLIENT_ID}
        VITE_AZURE_REDIRECT_URI: ${VITE_AZURE_REDIRECT_URI:-http://localhost:5173}
        VITE_DEV_LOGIN: ${VITE_DEV_LOGIN:-false}
        VITE_SPEAKING_AUDIO: ${VITE_SPEAKING_AUDIO:-false}
    container_name: trainer-frontend
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  pgdata:
