server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy — single source of truth for dev AND prod.
    # media-src MUST allow blob: and data: or the speaking-assessment audio is blocked:
    #   - results screen plays a data:audio/wav URL (Speaking.jsx)
    #   - manager/dashboard plays a blob: URL fetched with auth (AttemptReview.jsx)
    # Without an explicit media-src, browsers fall back to default-src 'self', which
    # allows neither — the <audio> element then shows 0:00 / 0:00.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; media-src 'self' blob: data:; font-src 'self' data: https: https://fonts.gstatic.com; connect-src 'self' ws: wss: https:; worker-src 'self' blob:; object-src 'none';" always;

    # SPA fallback — all client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
