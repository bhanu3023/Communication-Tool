server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
